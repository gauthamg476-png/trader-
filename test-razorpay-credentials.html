<!DOCTYPE html>
<html>
<head>
    <title>Test Razorpay Credentials</title>
    <script src="https://checkout.razorpay.com/v1/checkout.js"></script>
</head>
<body>
    <h2>Razorpay Credentials Test</h2>
    <button onclick="testRazorpay()">Test Razorpay Payment</button>
    <div id="result"></div>

    <script>
        function testRazorpay() {
            const keyId = 'rzp_test_SLAGPnPEl8XURl'; // From your .env
            
            console.log('Testing Razorpay with Key ID:', keyId);
            
            const options = {
                key: keyId,
                amount: 10000, // ₹100 in paise
                currency: 'INR',
                name: 'BALAJI & CO',
                description: 'Test Payment',
                order_id: 'test_order_' + Date.now(),
                handler: function (response) {
                    document.getElementById('result').innerHTML = 
                        '<p style="color: green;">✅ Payment Successful!</p>' +
                        '<p>Payment ID: ' + response.razorpay_payment_id + '</p>';
                    console.log('Payment successful:', response);
                },
                prefill: {
                    name: 'Test Customer',
                    email: 'test@example.com',
                    contact: '9999999999'
                },
                theme: {
                    color: '#f59e0b'
                },
                modal: {
                    ondismiss: function() {
                        document.getElementById('result').innerHTML = 
                            '<p style="color: orange;">❌ Payment Cancelled</p>';
                        console.log('Payment cancelled');
                    }
                }
            };

            try {
                const rzp = new Razorpay(options);
                rzp.open();
            } catch (error) {
                document.getElementById('result').innerHTML = 
                    '<p style="color: red;">❌ Error: ' + error.message + '</p>';
                console.error('Razorpay error:', error);
            }
        }
    </script>
</body>
</html>
